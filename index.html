<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MC Companion">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Minecraft Companion</title>
<style>
:root{
  --green:#1D9E75;--green-light:#E1F5EE;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#666660;--text3:#999990;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --green:#5DCAA5;--green-light:#04342C;
  --blue:#85B7EB;--blue-light:#042C53;
  --amber:#FAC775;--amber-light:#412402;
  --purple:#AFA9EC;--purple-light:#26215C;
  --red:#F09595;--red-light:#501313;
  --teal:#9FE1CB;--teal-light:#085041;
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#6e6e73;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border2);background:var(--bg);padding-top:var(--safe-top);flex-shrink:0}
.tab-btn{flex:1;padding:12px 2px 10px;font-size:11px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;line-height:1.3}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-pane{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.tab-pane.active{display:flex}

/* ── shared header ── */
.hd{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:12px 16px 0;flex-shrink:0}
.hd-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hd-title{font-size:17px;font-weight:600}
.hd-sub{font-size:11px;color:var(--text2)}
.reset-btn{font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 0;font-family:inherit}
.prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-bar-outer{flex:1;height:8px;background:var(--bg3);border-radius:999px;overflow:hidden}
.prog-bar-inner{height:100%;background:var(--green);border-radius:999px;transition:width .3s}
.prog-label{font-size:12px;font-weight:600;color:var(--text2);min-width:56px;text-align:right}
.filters{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.f-btn{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:999px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.f-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.list-wrap{flex:1;overflow-y:auto;padding:0 16px calc(var(--safe-bottom)+20px);-webkit-overflow-scrolling:touch;min-height:0}

/* ── checklist ── */
.phase-hd{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:18px 0 5px;border-bottom:0.5px solid var(--border);margin-bottom:2px}
.item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.item:active{opacity:.7}
.item:last-child{border-bottom:none}
.cb{width:22px;height:22px;min-width:22px;border-radius:6px;border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.cb.done{background:var(--green);border-color:var(--green)}
.cb.done::after{content:'';display:block;width:6px;height:11px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.item-body{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.done-text{text-decoration:line-through;opacity:.42}
.item-hint{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:999px;white-space:nowrap}
.b-c{background:var(--amber-light);color:var(--amber)}
.b-g{background:var(--blue-light);color:var(--blue)}
.b-h{background:var(--purple-light);color:var(--purple)}

/* ── challenge guide ── */
.guide-hd{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:10px 16px;flex-shrink:0}
.search-input{width:100%;padding:9px 14px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-top:8px}
.search-input:focus{border-color:var(--green)}
.guide-wrap{flex:1;overflow-y:auto;padding:10px 16px calc(var(--safe-bottom)+20px);-webkit-overflow-scrolling:touch;min-height:0}
.chal-card{border:0.5px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:10px;background:var(--bg)}
.chal-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.chal-header:active{opacity:.7}
.c-cb{width:20px;height:20px;min-width:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.c-cb.done{background:var(--green);border-color:var(--green)}
.c-cb.done::after{content:'';display:block;width:5px;height:9px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.c-title-wrap{flex:1;min-width:0}
.c-title{font-size:14px;font-weight:600;color:var(--text)}
.c-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px}
.chev{color:var(--text3);font-size:10px;transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.chal-body{display:none;border-top:0.5px solid var(--border);padding:12px 14px 14px;background:var(--bg2)}
.chal-body.open{display:block}
.c-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.sec-title{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.req-list{list-style:none;margin-bottom:12px}
.req-list li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text);line-height:1.4;cursor:pointer}
.req-list li:last-child{border-bottom:none}
.req-list li:active{opacity:.7}
.r-cb{width:18px;height:18px;min-width:18px;border-radius:4px;border:1.5px solid var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;flex-shrink:0}
.r-cb.done{background:var(--green);border-color:var(--green)}
.r-cb.done::after{content:'';display:block;width:4px;height:8px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}
.r-text{flex:1}
.tip-box{background:var(--amber-light);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--amber);line-height:1.5}
.diff-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;white-space:nowrap}
.diff-hard{background:var(--red-light);color:var(--red)}
.diff-medium{background:var(--amber-light);color:var(--amber)}
.diff-easy{background:var(--green-light);color:var(--green)}

/* ── crafting tab ── */
.craft-hd{background:var(--bg);border-bottom:0.5px solid var(--border2);padding:10px 16px;flex-shrink:0}
.craft-filters{display:flex;gap:5px;overflow-x:auto;padding:8px 0 0;scrollbar-width:none;padding-bottom:10px}
.craft-filters::-webkit-scrollbar{display:none}
.craft-wrap{flex:1;overflow-y:auto;padding:8px 16px calc(var(--safe-bottom)+20px);min-height:0}
.craft-section-hd{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:14px 0 6px;border-bottom:0.5px solid var(--border);margin-bottom:4px}
.craft-card{border:0.5px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:8px;background:var(--bg)}
.craft-hdr{display:flex;align-items:center;gap:10px;padding:11px 12px;cursor:pointer;user-select:none}
.craft-hdr:active{opacity:.7}
.craft-emoji{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.craft-name-wrap{flex:1;min-width:0}
.craft-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
.craft-yields{font-size:11px;color:var(--text3);margin-top:1px}
.craft-body{display:none;border-top:0.5px solid var(--border);padding:10px 12px 12px;background:var(--bg2)}
.craft-body.open{display:block}
.craft-station{font-size:11px;color:var(--teal);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.craft-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:180px;margin-bottom:10px}
.craft-cell{height:44px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2)}
.craft-cell.filled{background:var(--bg3);color:var(--text)}
.craft-cell-label{font-size:8px;text-align:center;color:var(--text3);margin-top:2px;line-height:1.2}
.craft-grid-wrap{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.craft-arrow{font-size:18px;color:var(--text3);align-self:center;padding-top:2px}
.craft-result{text-align:center}
.craft-result-cell{width:52px;height:52px;border:1px solid var(--green);border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 4px}
.craft-result-label{font-size:11px;font-weight:600;color:var(--text);text-align:center}
.craft-result-qty{font-size:10px;color:var(--text3)}
.craft-ingredients{font-size:12px;color:var(--text2);line-height:1.7}
.craft-ingredients strong{color:var(--text);font-weight:500}
.craft-note{font-size:11px;color:var(--text3);font-style:italic;margin-top:6px;line-height:1.4}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:40px 0}
</style>
</head>
<body>
<div id="app">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="checklist">✅<br>Checklist</button>
    <button class="tab-btn" data-tab="guide">⚔️<br>Challenges</button>
    <button class="tab-btn" data-tab="crafting">🔨<br>Crafting</button>
  </div>

  <!-- ══════════ CHECKLIST ══════════ -->
  <div class="tab-pane active" id="pane-checklist">
    <div class="hd">
      <div class="hd-row1">
        <div><div class="hd-title">MC Advancements</div><div class="hd-sub">125 advancements · ordered by progression</div></div>
        <button class="reset-btn" id="resetBtn">Reset all</button>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar-outer"><div class="prog-bar-inner" id="bar"></div></div>
        <div class="prog-label" id="prog">0 / 125</div>
      </div>
      <div class="filters">
        <button class="f-btn active" data-f="all">All</button>
        <button class="f-btn" data-f="remaining">Remaining</button>
        <button class="f-btn" data-f="done">Done</button>
        <button class="f-btn" data-f="challenge">Challenges</button>
        <button class="f-btn" data-f="goal">Goals</button>
        <button class="f-btn" data-f="hidden">Hidden</button>
      </div>
    </div>
    <div class="list-wrap" id="listWrap"></div>
  </div>

  <!-- ══════════ CHALLENGE GUIDE ══════════ -->
  <div class="tab-pane" id="pane-guide">
    <div class="guide-hd">
      <div class="hd-row1">
        <div><div class="hd-title">Challenge Guide</div><div class="hd-sub">Requirements & tips for every challenge</div></div>
      </div>
      <input class="search-input" id="guideSearch" type="search" placeholder="Search challenges…">
    </div>
    <div class="guide-wrap" id="guideWrap"></div>
  </div>

  <!-- ══════════ CRAFTING REFERENCE ══════════ -->
  <div class="tab-pane" id="pane-crafting">
    <div class="craft-hd">
      <div class="hd-row1">
        <div><div class="hd-title">Crafting Reference</div><div class="hd-sub">Tap any item to see its recipe</div></div>
      </div>
      <input class="search-input" id="craftSearch" type="search" placeholder="Search recipes…">
      <div class="craft-filters" id="craftFilters">
        <button class="f-btn active" data-cf="all">All</button>
        <button class="f-btn" data-cf="tools">Tools</button>
        <button class="f-btn" data-cf="weapons">Weapons</button>
        <button class="f-btn" data-cf="armor">Armor</button>
        <button class="f-btn" data-cf="blocks">Blocks</button>
        <button class="f-btn" data-cf="food">Food</button>
        <button class="f-btn" data-cf="redstone">Redstone</button>
        <button class="f-btn" data-cf="utility">Utility</button>
        <button class="f-btn" data-cf="decorative">Decorative</button>
        <button class="f-btn" data-cf="misc">Misc</button>
      </div>
    </div>
    <div class="craft-wrap" id="craftWrap"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const AKEY='mc_adv_v3',RKEY='mc_req_v3';
let checked={},reqChecked={};
try{checked=JSON.parse(localStorage.getItem(AKEY)||'{}');}catch(e){}
try{reqChecked=JSON.parse(localStorage.getItem(RKEY)||'{}');}catch(e){}
function saveAdv(){try{localStorage.setItem(AKEY,JSON.stringify(checked));}catch(e){}}
function saveReq(){try{localStorage.setItem(RKEY,JSON.stringify(reqChecked));}catch(e){}}

/* ── Advancement phases ── */
const phases=[
  {label:"Phase 1 — First day survival",items:[
    {n:"Minecraft",h:"Craft a crafting table and have it in your inventory"},
    {n:"Stone Age",h:"Mine cobblestone, blackstone, or cobbled deepslate"},

  {label:"Phase 7 — Nether exploration",items:[

    {n:"Not Quite 'Nine' Lives",h:"Fully charge a respawn anchor with 4 glowstone"},

  {label:"Phase 9 — The End & Ender Dragon",items:[

    {n:"The Next Generation",h:"Pick up the dragon egg",t:"goal"},

    {n:"Remote Gateway",h:"Enter an end gateway via ender pearl"},
    {n:"The City at the End of the Game",h:"Find and enter an End City"},

    {n:"Great View From Up Here",h:"Rise 50 blocks while levitated by a shulker",t:"challenge"},
    {n:"Is It a Plane?",h:"Look at the Ender Dragon through a spyglass"},

  const done=countDone();
  document.getElementById('bar').style.width=(done/total*100)+'%';
  document.getElementById('prog').textContent=done+' / '+total;
}
let activeFilter='all';
function renderChecklist(){
  const wrap=document.getElementById('listWrap');
  const frag=document.createDocumentFragment();
  let any=false;
  phases.forEach((phase,pi)=>{
    const vis=phase.items.filter((item,ii)=>{
      const k=ikey(pi,ii);
      if(activeFilter==='remaining')return !checked[k];
      if(activeFilter==='done')return !!checked[k];
      if(activeFilter==='challenge')return item.t==='challenge';
      if(activeFilter==='goal')return item.t==='goal';
      if(activeFilter==='hidden')return item.t==='hidden';
      return true;
    });
    if(!vis.length)return;
    any=true;
    const ph=document.createElement('div');ph.className='phase-hd';ph.textContent=phase.label;frag.appendChild(ph);
    vis.forEach(item=>{
      const ii=phase.items.indexOf(item);
      const k=ikey(pi,ii);
      const isDone=!!checked[k];
      const div=document.createElement('div');div.className='item';
      const cb=document.createElement('div');cb.className='cb'+(isDone?' done':'');
      const body=document.createElement('div');body.className='item-body';
      const nr=document.createElement('div');nr.className='item-name'+(isDone?' done-text':'');
      nr.appendChild(document.createTextNode(item.n));
      if(item.t==='challenge'){const b=document.createElement('span');b.className='badge b-c';b.textContent='Challenge';nr.appendChild(b);}
      else if(item.t==='goal'){const b=document.createElement('span');b.className='badge b-g';b.textContent='Goal';nr.appendChild(b);}
      else if(item.t==='hidden'){const b=document.createElement('span');b.className='badge b-h';b.textContent='Hidden';nr.appendChild(b);}
      const hint=document.createElement('div');hint.className='item-hint'+(isDone?' done-text':'');hint.textContent=item.h;
      body.appendChild(nr);body.appendChild(hint);div.appendChild(cb);div.appendChild(body);
      div.addEventListener('click',()=>{
        checked[k]=!checked[k];saveAdv();
        cb.className='cb'+(checked[k]?' done':'');
        nr.className='item-name'+(checked[k]?' done-text':'');
        hint.className='item-hint'+(checked[k]?' done-text':'');
        updateProgress();
      });
      frag.appendChild(div);
    });
  });
  if(!any){const e=document.createElement('div');e.className='empty';e.innerHTML='<div style="font-size:28px;margin-bottom:8px">🎉</div>All done!';frag.appendChild(e);}
  wrap.innerHTML='';wrap.appendChild(frag);updateProgress();
}
document.querySelector('.filters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-f]');if(!btn)return;
  activeFilter=btn.dataset.f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderChecklist();
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('Reset ALL progress?'))return;
  checked={};reqChecked={};saveAdv();saveReq();renderChecklist();renderGuide('');
});

/* ═══════════════════════════════════════════
   CHALLENGE GUIDE RENDERING
═══════════════════════════════════════════ */
function diffPill(d){
  if(d==='hard')return '<span class="diff-pill diff-hard">Hard</span>';
  if(d==='medium')return '<span class="diff-pill diff-medium">Medium</span>';
  return '<span class="diff-pill diff-easy">Easy</span>';
}
function renderGuide(query){
  const wrap=document.getElementById('guideWrap');
  const q=(query||'').toLowerCase().trim();
  const frag=document.createDocumentFragment();
  let any=false;
  challenges.forEach(ch=>{
    if(q&&!ch.name.toLowerCase().includes(q)&&!ch.desc.toLowerCase().includes(q))return;
    any=true;
    const dc=ch.reqs.filter(r=>reqChecked[r.id]).length;
    const allDone=dc===ch.reqs.length;
    const card=document.createElement('div');card.className='chal-card';
    const hdr=document.createElement('div');hdr.className='chal-header';
    const ccb=document.createElement('div');ccb.className='c-cb'+(allDone?' done':'');
    const tw=document.createElement('div');tw.className='c-title-wrap';
    tw.innerHTML='<div class="c-title">'+ch.name+'</div><div class="c-meta"><span>'+dc+'/'+ch.reqs.length+' items</span>'+diffPill(ch.diff)+'</div>';
    const chev=document.createElement('div');chev.className='chev';chev.textContent='▼';
    hdr.appendChild(ccb);hdr.appendChild(tw);hdr.appendChild(chev);
    const body=document.createElement('div');body.className='chal-body';
    const desc=document.createElement('div');desc.className='c-desc';desc.textContent=ch.desc;body.appendChild(desc);
    const rt=document.createElement('div');rt.className='sec-title';rt.textContent='What you need';body.appendChild(rt);
    const ul=document.createElement('ul');ul.className='req-list';
    ch.reqs.forEach(r=>{
      const li=document.createElement('li');
      const rcb=document.createElement('div');rcb.className='r-cb'+(reqChecked[r.id]?' done':'');
      const rt2=document.createElement('span');rt2.className='r-text'+(reqChecked[r.id]?' done-text':'');rt2.textContent=r.text;
      li.appendChild(rcb);li.appendChild(rt2);
      li.addEventListener('click',ev=>{
        ev.stopPropagation();reqChecked[r.id]=!reqChecked[r.id];saveReq();
        rcb.className='r-cb'+(reqChecked[r.id]?' done':'');
        rt2.className='r-text'+(reqChecked[r.id]?' done-text':'');
        const nd=ch.reqs.filter(x=>reqChecked[x.id]).length;
        tw.querySelector('.c-meta').innerHTML='<span>'+nd+'/'+ch.reqs.length+' items</span>'+diffPill(ch.diff);
        ccb.className='c-cb'+(nd===ch.reqs.length?' done':'');
      });
      ul.appendChild(li);
    });
    body.appendChild(ul);
    if(ch.tip){const tip=document.createElement('div');tip.className='tip-box';tip.innerHTML='<strong>Tip:</strong> '+ch.tip;body.appendChild(tip);}
    hdr.addEventListener('click',()=>{const o=body.classList.contains('open');body.classList.toggle('open',!o);chev.classList.toggle('open',!o);});
    card.appendChild(hdr);card.appendChild(body);frag.appendChild(card);
  });
  if(!any){const e=document.createElement('div');e.className='empty';e.textContent='No results.';frag.appendChild(e);}
  wrap.innerHTML='';wrap.appendChild(frag);
}
document.getElementById('guideSearch').addEventListener('input',e=>renderGuide(e.target.value));

/* ═══════════════════════════════════════════
   CRAFTING REFERENCE RENDERING
═══════════════════════════════════════════ */
const stationLabel={
  crafting:'Inventory / Crafting Table',table:'Crafting Table (3×3)',
  furnace:'Furnace',smoker:'Smoker',blast:'Blast Furnace',
  smithing:'Smithing Table',stonecutter:'Stonecutter',
  brewing:'Brewing Stand',none:'Not craftable'
};
const stationEmoji={
  crafting:'🪵',table:'🪵',furnace:'🔥',smoker:'💨',blast:'🔥',
  smithing:'🔨',stonecutter:'🪨',brewing:'⚗️',none:'❌'
};
let activeCraftCat='all';
function renderCrafting(query){
  const wrap=document.getElementById('craftWrap');
  const q=(query||'').toLowerCase().trim();
  const frag=document.createDocumentFragment();
  const cats=Object.keys(craftCats);
  let anyGlobal=false;
  cats.forEach(cat=>{
    if(activeCraftCat!=='all'&&activeCraftCat!==cat)return;
    const items=recipes.filter(r=>{
      if(r.cat!==cat)return false;
      if(q&&!r.name.toLowerCase().includes(q)&&!(r.ingredients||'').toLowerCase().includes(q))return false;
      return true;
    });
    if(!items.length)return;
    anyGlobal=true;
    const hd=document.createElement('div');hd.className='craft-section-hd';hd.textContent=craftCats[cat];frag.appendChild(hd);
    items.forEach(r=>{
      const card=document.createElement('div');card.className='craft-card';
      const hdr=document.createElement('div');hdr.className='craft-hdr';
      const em=document.createElement('div');em.className='craft-emoji';em.textContent=r.emoji;
      const nw=document.createElement('div');nw.className='craft-name-wrap';
      nw.innerHTML='<div class="craft-name">'+r.name+'</div><div class="craft-yields">Yields: '+r.yields+(r.station!=='none'?' · '+stationEmoji[r.station]+' '+stationLabel[r.station]:'')+'</div>';
      const chev=document.createElement('div');chev.className='chev';chev.textContent='▼';
      hdr.appendChild(em);hdr.appendChild(nw);hdr.appendChild(chev);
      const body=document.createElement('div');body.className='craft-body';
      /* station */
      const sta=document.createElement('div');sta.className='craft-station';
      sta.textContent=stationEmoji[r.station]+' '+stationLabel[r.station];body.appendChild(sta);
      /* grid + result */
      if(r.station!=='none'&&r.station!=='brewing'&&r.station!=='smithing'){
        const gw=document.createElement('div');gw.className='craft-grid-wrap';
        const grid=document.createElement('div');
        const cols=r.station==='crafting'?2:3;
        grid.style.cssText='display:grid;grid-template-columns:repeat('+cols+',1fr);gap:4px;max-width:'+(cols===2?120:180)+'px';
        const cells=(r.station==='crafting')?[r.grid[3],r.grid[4],r.grid[6],r.grid[7]]:r.grid;
        cells.forEach(c=>{
          const cell=document.createElement('div');
          cell.className='craft-cell'+(c?' filled':'');
          cell.style.cssText='height:44px;border:0.5px solid var(--border2);border-radius:6px;background:'+(c?'var(--bg3)':'var(--bg)')+';display:flex;align-items:center;justify-content:center;font-size:20px';
          cell.textContent=c||'';grid.appendChild(cell);
        });
        gw.appendChild(grid);
        const arr=document.createElement('div');arr.className='craft-arrow';arr.textContent='→';gw.appendChild(arr);
        const res=document.createElement('div');res.className='craft-result';
        res.innerHTML='<div class="craft-result-cell">'+r.emoji+'</div><div class="craft-result-label">'+r.name+'</div><div class="craft-result-qty">×'+r.yields+'</div>';
        gw.appendChild(res);body.appendChild(gw);
      }
      /* ingredients text */
      const ing=document.createElement('div');ing.className='craft-ingredients';
      ing.innerHTML='<strong>Ingredients:</strong> '+r.ingredients;body.appendChild(ing);
      if(r.note){const n=document.createElement('div');n.className='craft-note';n.textContent='Note: '+r.note;body.appendChild(n);}
      hdr.addEventListener('click',()=>{const o=body.classList.contains('open');body.classList.toggle('open',!o);chev.classList.toggle('open',!o);});
      card.appendChild(hdr);card.appendChild(body);frag.appendChild(card);
    });
  });
  if(!anyGlobal){const e=document.createElement('div');e.className='empty';e.textContent='No recipes found.';frag.appendChild(e);}
  wrap.innerHTML='';wrap.appendChild(frag);
}
document.getElementById('craftSearch').addEventListener('input',e=>renderCrafting(e.target.value));
document.getElementById('craftFilters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-cf]');if(!btn)return;
  activeCraftCat=btn.dataset.cf;
  document.querySelectorAll('[data-cf]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCrafting(document.getElementById('craftSearch').value);
});

/* ═══════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════ */
document.querySelector('.tab-bar').addEventListener('click',e=>{
  const btn=e.target.closest('[data-tab]');if(!btn)return;
  const tab=btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderChecklist();
renderGuide('');
renderCrafting('');
</script>
</body>
</html>
